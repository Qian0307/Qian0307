name: Update README

on:
  schedule:
    - cron: "0 16 * * *"  # 台灣時間每天 00:00
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Update README
        run: |
          echo "## 📅 Daily Log" > log.txt
          echo "- Date: $(date)" >> log.txt
          echo "- Studying: Psychology / Coding / English" >> log.txt
          
          sed -i '/<!--START_SECTION-->/,/<!--END_SECTION-->/c\
<!--START_SECTION-->\
'"$(cat log.txt)"'\
<!--END_SECTION-->' README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "update readme" || echo "no changes"
          git push
